name: dartstream_smoke
description: End-to-end smoke CLI for the DartStream dev API.
publish_to: none

# Min Dart 3.12.0; tracks latest stable (^ accepts newer). See README Prerequisites.
environment:
  sdk: ^3.12.0

dependencies:
  http: ^1.2.2

  # IntelliToggle (Aortem feature-flag SaaS) via OpenFeature — used by
  # bin/intellitoggle_deepdive.dart. Pure-Dart, so it runs in this CLI exactly
  # as the Flutter client uses it. The provider does the OAuth2
  # client-credentials exchange internally.
  openfeature_dart_server_sdk: ^0.0.22
  openfeature_provider_intellitoggle: ^0.0.9
