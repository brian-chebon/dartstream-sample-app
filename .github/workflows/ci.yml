name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  smoke:
    name: analyze smoke + deep-dive CLIs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Track the latest stable Dart (min 3.12.0; see README Prerequisites).
      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable
      - run: dart pub get
      - run: dart analyze bin

  client:
    name: analyze Flutter client
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: flutter_client
    steps:
      - uses: actions/checkout@v4
      # Track the latest stable Flutter (min Dart 3.12.0; see README Prerequisites).
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get
      - run: flutter analyze
