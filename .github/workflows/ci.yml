name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  smoke:
    name: analyze smoke + deep-dive CLIs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Pinned to the documented repo floor (Dart 3.12.0); see README Prerequisites.
      - uses: dart-lang/setup-dart@v1
        with:
          sdk: "3.12.0"
      - run: dart pub get
      - run: dart analyze bin

  client:
    name: analyze Flutter client
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: flutter_client
    steps:
      - uses: actions/checkout@v4
      # Pinned to the documented floor (Flutter 3.44.0 → bundles Dart 3.12.0).
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: "3.44.0"
      - run: flutter pub get
      - run: flutter analyze
